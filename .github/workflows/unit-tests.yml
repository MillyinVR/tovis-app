name: unit-tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Typecheck and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Private-repo runners are 2-core/7GB (public repos get 4-core/16GB), so
    # Node's default heap cap lands near 2GB — below what tsc needs here.
    env:
      NODE_OPTIONS: --max-old-space-size=4096

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      # CLAUDE.md has always mandated lint before pushing, but no workflow ran
      # it — so an introduced ESLint *error* shipped green. Warnings stay
      # non-blocking (there is a large pre-existing backlog); this fails only on
      # errors, which is what the house rule actually asks for.
      - name: Lint
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test
