name: perf-availability

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  availability-performance:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    services:
      postgres:
        # imresamu/postgis "bundle" ships PostGIS 3.x AND pgvector on
        # Postgres 16, so `prisma migrate deploy` can apply both the P2.4a
        # postgis migration and the §6.0 pgvector migration (which runs its
        # own CREATE EXTENSION vector).
        image: imresamu/postgis:16-3.4-bundle0
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tovis_perf
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tovis_perf"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      CI: true
      NODE_ENV: test

      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5433/tovis_perf?schema=public
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5433/tovis_perf?schema=public

      ALLOW_SEED_SCRIPT: "1"
      CONFIRM_NON_PRODUCTION_DB: "1"

      JWT_SECRET: ci-test-jwt-secret-do-not-use-in-production
      AUTH_TRUSTED_IP_HEADER: x-forwarded-for

      # Throwaway CI-only keyring for contact lookup blind indexes; must be a
      # JSON object of {keyVersion: base64 32-byte key} including version "1".
      PII_LOOKUP_HMAC_KEYS_JSON: '{"1":"etfeByiHOVyNpw8UkYzTNJd5Qw7H6otd6zcVsNknnEo="}'

      # Throwaway CI-only AEAD keyring for address privacy envelopes; the
      # booking hold path encrypts addresses with the address-aead-v1 key.
      PII_AEAD_KEYS_JSON: '{"address-aead-v1":"hAqUA35ANVrdRmZNw+0RXJgboRX5qmLv2j55LUczX2E="}'

      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-test-supabase-anon-key
      SUPABASE_ANON_KEY: ci-test-supabase-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-test-supabase-service-role-key

      PERF_SAMPLES: ${{ github.event_name == 'workflow_dispatch' && '30' || '3' }}
      PERF_BOOKING_URL: ${{ secrets.PERF_BOOKING_URL }}
      PERF_BOOKING_TRIGGER_SELECTOR: ${{ secrets.PERF_BOOKING_TRIGGER_SELECTOR }}
      PERF_SLOT_BUTTON_SELECTOR: ${{ secrets.PERF_SLOT_BUTTON_SELECTOR }}
      PERF_DRAWER_CONTINUE_SELECTOR: ${{ secrets.PERF_DRAWER_CONTINUE_SELECTOR }}
      PERF_BACKGROUND_REFRESH_TRIGGER_SELECTOR: '[data-testid="availability-refresh-button"]'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Ensure perf artifact directories
        run: |
          mkdir -p artifacts/perf/availability
          mkdir -p test-results

      - name: Validate Prisma schema
        run: pnpm exec prisma validate

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Apply database migrations
        run: pnpm exec prisma migrate deploy

      - name: Seed canonical perf data
        run: pnpm run seed

      # Login looks up users by emailHashV2 only; seed.cjs does not write the
      # v2 hashes, so backfill them like db:test:seed does locally.
      - name: Backfill contact lookup hashes
        run: pnpm run backfill:contact-hash-v2 -- --write

      - name: Verify required perf config
        run: |
          test -n "$PERF_BOOKING_URL" || (echo "Missing PERF_BOOKING_URL secret" && exit 1)
          test -n "$PERF_BACKGROUND_REFRESH_TRIGGER_SELECTOR" || (echo "Missing PERF_BACKGROUND_REFRESH_TRIGGER_SELECTOR" && exit 1)
          echo "Required perf config is set"

      # Build once here rather than inside Playwright's `webServer` command,
      # which caps it at 120s. This job invokes `playwright test` TWICE and
      # `reuseExistingServer` is false on CI, so the build previously ran twice —
      # both times racing that timeout. Now each invocation only boots the
      # prebuilt server. See the note in playwright.config.ts.
      - name: Build
        run: pnpm run build

      - name: Run desktop perf collection
        run: pnpm exec playwright test tests/e2e/availability.perf.spec.ts --project=chromium

      - name: Run mobile perf collection
        run: pnpm exec playwright test tests/e2e/availability.perf.spec.ts --project=mobile-chrome

      - name: Aggregate perf results
        run: node scripts/perf/aggregateAvailabilityPerf.mjs

      - name: Check Gate 2 budgets
        if: github.event_name == 'workflow_dispatch'
        run: node scripts/perf/checkAvailabilityBudgets.mjs

      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: availability-perf-artifacts
          retention-days: 14
          path: |
            artifacts/perf/availability/raw-desktop.json
            artifacts/perf/availability/raw-mobile.json
            artifacts/perf/availability/summary.json
            artifacts/perf/availability/summary.md

      - name: Upload Playwright results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: availability-perf-playwright-results
          retention-days: 14
          path: |
            playwright-report
            test-results