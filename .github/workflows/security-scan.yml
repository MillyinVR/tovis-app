name: security-scan

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Weekly sweep so new advisories surface even without pushes.
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      # npm retired the classic audit endpoints (HTTP 410, July 2026) and no
      # released pnpm — 10.x through 11.13 — speaks the bulk-advisory
      # replacement yet, so `pnpm audit` cannot currently produce results at
      # all. Tolerate exactly that failure mode (with a loud warning) and fail
      # on anything else, so the gate self-heals the moment pnpm ships the
      # migration and real advisories block again.
      - name: Audit production dependencies (moderate+)
        run: |
          set +e
          output=$(pnpm audit --prod --audit-level=moderate 2>&1)
          rc=$?
          echo "$output"
          if [ $rc -ne 0 ] && echo "$output" | grep -q "ERR_PNPM_AUDIT_BAD_RESPONSE"; then
            echo "::warning::pnpm audit skipped: npm retired the classic audit endpoints and pnpm has no bulk-advisory support yet."
            exit 0
          fi
          exit $rc

      - name: Audit all dependencies (high+)
        run: |
          set +e
          output=$(pnpm audit --audit-level=high 2>&1)
          rc=$?
          echo "$output"
          if [ $rc -ne 0 ] && echo "$output" | grep -q "ERR_PNPM_AUDIT_BAD_RESPONSE"; then
            echo "::warning::pnpm audit skipped: npm retired the classic audit endpoints and pnpm has no bulk-advisory support yet."
            exit 0
          fi
          exit $rc

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
