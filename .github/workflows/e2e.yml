name: e2e

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: Browser E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tovis_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d tovis_e2e"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      CI: "true"
      NODE_ENV: test
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: 1

      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/tovis_e2e?schema=public
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/tovis_e2e?schema=public

      JWT_SECRET: test-jwt-secret
      NEXTAUTH_SECRET: test-nextauth-secret

      SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_ANON_KEY: test-supabase-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-supabase-service-role-key

      UPSTASH_REDIS_REST_URL: https://example.com
      UPSTASH_REDIS_REST_TOKEN: test-upstash-token

      TWILIO_ACCOUNT_SID: test-twilio-sid
      TWILIO_AUTH_TOKEN: test-twilio-token
      TWILIO_VERIFY_SERVICE_SID: test-twilio-verify-service-sid
      TWILIO_FROM_NUMBER: +15555550123

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Push Prisma schema
        run: npx prisma db push --skip-generate

      - name: Seed test data
        run: npm run seed
      - name: Run browser E2E
        run: npm run test:e2e:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 14