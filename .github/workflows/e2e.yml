name: e2e

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Compute which Playwright browser projects to run for this event. PRs run
  # chromium only for fast feedback; the post-merge push to `main` runs the full
  # matrix (incl. mobile-chrome) so mobile-viewport regressions are caught before
  # release. The list is fanned out into one parallel job PER project below — so
  # the full matrix runs as two short chromium-sized jobs rather than a single
  # ~40min serial job. Long jobs were the root cause of the intermittent "the
  # operation was canceled" preemption AND of the single shared `next start`
  # server getting overloaded into navigation timeouts.
  resolve-matrix:
    name: Resolve browser matrix
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.resolve.outputs.projects }}
    steps:
      - id: resolve
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo 'projects=["chromium"]' >> "$GITHUB_OUTPUT"
          else
            echo 'projects=["chromium","mobile-chrome"]' >> "$GITHUB_OUTPUT"
          fi

  e2e:
    name: Browser E2E (${{ matrix.project }})
    needs: resolve-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      # Don't let one browser's failure cancel the sibling browser's job — we
      # want to see every project's result, not just the first to fail.
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.resolve-matrix.outputs.projects) }}

    services:
      postgres:
        # imresamu/postgis "bundle" ships PostGIS 3.x AND pgvector on
        # Postgres 16. Init enables postgis against POSTGRES_DB (geography
        # column for P2.4a ProfessionalSearchIndex); pgvector is enabled by
        # the explicit CREATE EXTENSION step below so `prisma db push` can
        # create the §6.0 vector(1024) columns.
        image: imresamu/postgis:16-3.4-bundle0
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tovis_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d tovis_e2e"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      CI: "true"
      NODE_ENV: test
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: 1

      # Keep the availability perf sampler out of the functional e2e gate: it
      # saturates the single shared `next start` server for ~3min and times out
      # the specs that run right after it. It runs in perf-availability.yml.
      E2E_SKIP_PERF: "1"

      # The functional suite drives a single `next start` process (one Prisma
      # pool) and the heaviest spec (booking-lifecycle "launch proof") fans out
      # many concurrent requests across two browser contexts. Prisma's default
      # pool (~num_cpus*2+1 ≈ 9 on a 4-core runner) saturates under that burst,
      # which surfaces as 30s navigation timeouts and the occasional transient
      # login-write error. The Postgres service allows 100 connections, so give
      # the pool real headroom. connection_limit is a no-op for `db push`/seed.
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/tovis_e2e?schema=public&connection_limit=25&pool_timeout=30
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/tovis_e2e?schema=public

      JWT_SECRET: ci-test-jwt-secret-do-not-use-in-production
      NEXTAUTH_SECRET: test-nextauth-secret
      AUTH_TRUSTED_IP_HEADER: x-forwarded-for

      # Throwaway CI-only keyring for contact lookup blind indexes; must be a
      # JSON object of {keyVersion: base64 32-byte key} including version "1".
      PII_LOOKUP_HMAC_KEYS_JSON: '{"1":"etfeByiHOVyNpw8UkYzTNJd5Qw7H6otd6zcVsNknnEo="}'

      # Throwaway CI-only AEAD keyring for address privacy envelopes; the
      # booking hold path encrypts addresses with the address-aead-v1 key.
      PII_AEAD_KEYS_JSON: '{"address-aead-v1":"hAqUA35ANVrdRmZNw+0RXJgboRX5qmLv2j55LUczX2E="}'

      SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_ANON_KEY: test-supabase-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-supabase-service-role-key

      # UPSTASH_REDIS_REST_* is intentionally unset: lib/redis.ts disables
      # Redis cleanly when unconfigured, while a fake URL makes every cache
      # operation issue a failing HTTP request.

      TWILIO_ACCOUNT_SID: test-twilio-sid
      TWILIO_AUTH_TOKEN: test-twilio-token
      TWILIO_VERIFY_SERVICE_SID: test-twilio-verify-service-sid
      TWILIO_FROM_NUMBER: +15555550123

      # Signup e2e (tests/e2e/signup.spec.ts): Cloudflare's documented
      # always-pass Turnstile test keys (public values, not secrets) and the
      # terms version the register route stamps on new accounts. The fake
      # Twilio creds above make verification sends fail gracefully in the
      # background tail without blocking the 201.
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
      TOVIS_TOS_VERSION: "2026-04"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Enable pgvector
        # The bundle image ships vector.control but only auto-enables postgis;
        # `db push` needs the extension to exist before it can create the
        # vector(1024) columns (migrate deploy would create it itself).
        # Connects via the job-level DIRECT_URL so the service password isn't
        # repeated inline (an inline literal also trips secret scanners).
        # psql rejects Prisma's ?schema= query parameter, so strip the query.
        run: psql "${DIRECT_URL%%\?*}" -c "CREATE EXTENSION IF NOT EXISTS vector"

      - name: Push Prisma schema
        run: pnpm exec prisma db push --skip-generate

      - name: Seed test data
        run: pnpm run seed

      # Login looks up users by emailHashV2 only; seed.cjs does not write the
      # v2 hashes, so backfill them like db:test:seed does locally.
      - name: Backfill contact lookup hashes
        run: pnpm run backfill:contact-hash-v2 -- --write

      # One project per job (see the `matrix` job above). `--project=<name>`
      # auto-runs its `setup` dependency, so each job seeds its own auth state.
      - name: Run browser E2E
        run: pnpm exec playwright test --project=${{ matrix.project }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results-${{ matrix.project }}
          path: test-results
          if-no-files-found: ignore
          retention-days: 14
