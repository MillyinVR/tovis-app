name: migrate-deploy

# Applies pending Prisma migrations to the production database on every merge to
# main, so the schema can never drift behind the deployed code.
#
# Why this exists: the Vercel build runs only `next build` (+ `prisma generate`)
# and never runs `prisma migrate deploy`. Without this workflow, a migration
# merged alongside the code that needs it silently misses production until the
# deployed code hits the missing column/enum and 500s (this caused the
# 2026-06-13 `proTenantId` MediaAsset outage).
#
# Scope: runs ONLY on push to main (and manual dispatch) — never on
# pull_request — so it cannot touch preview/branch databases. It applies
# whatever is pending; with the team's expand→contract discipline, expand
# (additive) migrations are backward-compatible, and contract migrations are
# only merged once their expand phase is fully deployed, so auto-applying on
# merge is safe in both cases.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   PRODUCTION_DATABASE_URL  – pooled connection string (the app's DATABASE_URL)
#   PRODUCTION_DIRECT_URL    – direct connection string (DIRECT_URL); this is
#                              what `migrate deploy` actually connects through.
# Until both are set, the job SKIPS `migrate deploy` and surfaces a loud
# `::warning::` annotation plus a job-summary note on every main push — the
# signal that migrations are NOT being auto-applied yet, without a permanently
# red check that erodes trust in CI. Add both secrets to enable auto-migration.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

# Serialize runs and NEVER cancel an in-flight migration — queue instead.
concurrency:
  group: migrate-deploy-production
  cancel-in-progress: false

jobs:
  migrate-deploy:
    name: Deploy DB migrations (production)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # --ignore-scripts skips the postinstall `prisma generate`; migrate deploy
      # needs only the prisma CLI + migration files + schema, not the client.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Detect whether the production DB secrets are configured. When they are
      # absent we SKIP the migrate step (and warn) instead of failing the job,
      # so an unconfigured repo does not leave a permanently red check on main.
      - name: Check for production DB secrets
        id: preflight
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}
        run: |
          if [ -z "$DATABASE_URL" ] || [ -z "$DIRECT_URL" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::PRODUCTION_DATABASE_URL and/or PRODUCTION_DIRECT_URL is not set — skipping prisma migrate deploy. Production migrations are NOT being auto-applied. Add both in Settings → Secrets and variables → Actions to enable."
            {
              echo "### ⚠️ Production migrations NOT applied"
              echo ""
              echo "\`PRODUCTION_DATABASE_URL\` and/or \`PRODUCTION_DIRECT_URL\` secrets are not configured, so this run skipped \`prisma migrate deploy\`."
              echo ""
              echo "Add both in **Settings → Secrets and variables → Actions** to enable automatic production migrations on merge to main."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply pending migrations
        if: steps.preflight.outputs.configured == 'true'
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}
        run: pnpm exec prisma migrate deploy
